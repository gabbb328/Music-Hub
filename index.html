<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Hub</title>
    <!-- VitePWA plugin automatically injects manifest and service worker -->
    <meta
      name="description"
      content="Music Hub - Stream, discover, and enjoy your favorite music with AI-powered recommendations"
    />
    <meta name="author" content="Music Hub" />

    <!-- Favicon dinamico — aggiornato via JS in ThemeContext -->
    <link
      rel="icon"
      type="image/png"
      href="/icons/app_blu_scuro.png"
      id="app-favicon"
    />
    <link
      rel="apple-touch-icon"
      href="/icons/app_blu_scuro.png"
      id="app-touch-icon"
    />

    <!-- PWA / mobile -->
    <meta name="theme-color" content="#080d1e" id="meta-theme-color" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Music Hub" />

    <style>
      :root {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --primary: 217.2 91.2% 59.8%;
        --card: 222.2 84% 4.9%;
      }
      html, body {
        background-color: #080d1e !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      #root {
        background-color: #080d1e !important;
        color: white;
      }
    </style>
    <!-- <script src="https://cdn.hyperscale.amazon.com/alexa-ext-sdk/latest/alexa-ext-sdk.js"></script> -->
  </head>

  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
